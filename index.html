<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tải App Syngenta</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #121212;
      margin: 0;
      font-family: Arial;
    }
    .container {
      display: flex;
      gap: 20px;
    }
    img {
      height: 60px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="https://apps.apple.com/us/app/syngenta-display/id6760986753" target="_blank">
      <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="App Store">
    </a>

    <a href="https://play.google.com/store/apps/details?id=com.mvc.syngenta&pcampaignid=web_share" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Google Play">
    </a>
  </div>
</body>
</html>
